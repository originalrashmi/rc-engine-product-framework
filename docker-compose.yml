# RC Engine -- Docker Compose
#
# Quick start:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up -d
#   3. Open http://localhost:3100
#
# Data persists in the ./data/ volume mount.

services:
  rc-engine:
    build: .
    ports:
      - "${RC_WEB_PORT:-3100}:3100"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - RC_WEB_PORT=3100
    volumes:
      # Persist SQLite databases and runtime state across restarts
      - ./data:/app/.rc-engine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/auth/me').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
