<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="navyfl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </linearGradient>
    <linearGradient id="navyfldim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1B2A4A" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <!-- Cream background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#F5F0E8"/>
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="#1B2A4A" stroke-width="2" opacity="0.12"/>

  <!-- Watermark RC — navy at low opacity -->
  <text x="256" y="430" font-family="'Trebuchet MS', 'Futura', 'Century Gothic', sans-serif" font-size="400" font-weight="700" fill="url(#navyfldim)" text-anchor="middle" letter-spacing="-20">RC</text>

  <!-- Pipeline line in navy -->
  <line x1="120" y1="260" x2="392" y2="260" stroke="#1B2A4A" stroke-width="1.5" opacity="0.15"/>
  <!-- Phase dots -->
  <circle cx="160" cy="260" r="4.5" fill="#1B2A4A" opacity="0.2"/>
  <circle cx="256" cy="260" r="6.5" fill="url(#navyfl)"/>
  <circle cx="352" cy="260" r="4.5" fill="#1B2A4A" opacity="0.2"/>

  <!-- Foreground RC — navy -->
  <text x="256" y="238" font-family="'Trebuchet MS', 'Futura', 'Century Gothic', sans-serif" font-size="130" font-weight="700" fill="url(#navyfl)" text-anchor="middle" letter-spacing="-4">RC</text>

  <!-- ENGINE below — navy -->
  <text x="256" y="322" font-family="'Trebuchet MS', 'Futura', 'Century Gothic', sans-serif" font-size="40" font-weight="400" fill="#1B2A4A" text-anchor="middle" letter-spacing="20" opacity="0.4">ENGINE</text>
</svg>